<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GYM MONITOR - V72 SUPABASE CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #050505; --panel: #0d0f11; --border: #1a1c1e;
            --text-main: #b1b5bb; --text-dim: #4b5563;
            --accent: #0d9488; --plum: #6C3365;   
        }
        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0.05em; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; min-height: 100vh; }
        
        /* 使用者識別列 */
        .user-header { background: var(--panel); border: 1px solid var(--accent); padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        .main-layout { display: flex; width: 100%; max-width: 1400px; gap: 30px; margin: 0 auto; align-items: flex-start; }
        .sidebar { flex: 0 0 350px; display: flex; flex-direction: column; gap: 25px; position: sticky; top: 20px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); width: 100%; }
        
        .btn-sync { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; text-align: center; }
        .content { flex: 1; display: flex; flex-direction: column; gap: 25px; min-width: 0; }
        
        input, select { background: #121416; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; outline: none; width: 100%; }
        
        /* 活動日誌表格：平均分散優化 */
        .log-table-container { width: 100%; }
        .log-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .log-table th, .log-table td { width: 20%; text-align: center; padding: 15px 5px; border-bottom: 1px solid #1a1c1e; }
        .log-table th { color: var(--text-dim); font-size: 0.85rem; }
        .btn-del { color: #822727; background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-toggle { flex: 1; height: 45px; background: #1a1c1e; color: #555; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-toggle.active.str { background: var(--accent) !important; color: #fff !important; }
        .btn-toggle.active.crdo { background: var(--plum) !important; color: #fff !important; }

        @media (max-width: 1024px) { .main-layout { flex-direction: column; } .sidebar { position: static; width: 100%; } }
        @media (max-width: 768px) { .log-table th, .log-table td { font-size: 0.7rem; padding: 10px 2px; } }
    </style>
</head>
<body>

<div class="user-header">
    <span>👤 當前使用者：</span>
    <input type="text" id="userName" placeholder="輸入名字 (例如：老大)" style="width: 150px; padding: 8px;" onchange="initCloud()">
    <button onclick="migrateFromLocal()" style="background: #1a1c1e; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">🔄 同步舊資料到雲端</button>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="panel">
            <button id="checkInBtn" class="btn-sync" onclick="doCheckIn()">⚡ 今日訓練打卡</button>
            <div id="calBox" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; text-align: center;"></div>
        </div>
        <div class="panel">
            <h4 style="color:var(--accent); margin-top:0;">🎯 今日任務</h4>
            <div id="dynamicTaskList" style="line-height: 2;"></div>
        </div>
    </div>

    <div class="content">
        <div class="panel">
            <h4 style="color:var(--accent); margin-top:0;">數據注入</h4>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px;">
                <input type="date" id="inputDate">
                <select id="inputGroup" onchange="updateItems()"></select>
                <select id="inputItem" onchange="handleItemChange()"></select>
            </div>
            <div id="inputFields" style="display:flex; gap:10px; margin-top:15px;">
                <div id="strBox" style="display:flex; gap:10px; width:100%;">
                    <input type="number" id="inputW" placeholder="重量(kg)">
                    <input type="number" id="inputS" placeholder="組數">
                </div>
                <div id="crdoBox" style="display:none; gap:10px; width:100%;">
                    <input type="number" id="inputSlope" placeholder="坡度%">
                    <input type="number" id="inputSpeed" placeholder="速度">
                    <input type="number" id="inputReps" placeholder="次數">
                    <input type="number" id="inputTime" placeholder="分鐘">
                </div>
            </div>
            <button class="btn-sync" style="margin-top:15px;" onclick="saveRecord()">確認新增紀錄</button>
        </div>

        <div class="panel">
            <div class="toggle-group">
                <button id="chartModeStr" class="btn-toggle active str" onclick="switchMode('str')">重量訓練</button>
                <button id="chartModeCrdo" class="btn-toggle crdo" onclick="switchMode('crdo')">有氧運動</button>
            </div>
            <div style="height:350px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="panel">
            <h4 style="color:var(--accent); margin-top:0;">活動日誌 (雲端同步)</h4>
            <div class="log-table-container">
                <table class="log-table">
                    <thead><tr><th>肌群/項目</th><th>數據</th><th>結果</th><th>日期</th><th>✕</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // === 老大！API 資訊我幫你填好了 ===
    const SUPABASE_URL = 'https://xwfhytstrefblmliqlaot.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3Zmh5dHNyZWZibG1saXFsYW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTY0MTAsImV4cCI6MjA5MDk3MjQxMH0.1-j8eQXjE5qpvnF7A3FWndij0CEfTUYTmrmFSn0W6Is';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let logs = [], checks = {}, activeMode = 'str', chartObj;
    const exerciseDB = { 
        "胸部": ["槓鈴臥推", "啞鈴臥推", "機械夾胸機", "上斜臥推"], 
        "背部": ["引體向上", "滑輪下拉", "槓鈴划船", "T桿划船"],
        "腿部": ["槓鈴深蹲", "腿推機", "內收夾腿機", "外展擴腿機", "哈克深蹲", "RDL"],
        "肩膀": ["啞鈴肩推", "側平舉", "後三角飛鳥"],
        "手臂": ["二頭彎舉", "三頭下壓"],
        "有氧": ["跑步機", "橢圓機", "波比跳", "跳繩", "划船機"] 
    };

    async function initCloud() {
        const user = document.getElementById('userName').value;
        if (!user) return;
        localStorage.setItem('gym_user_name', user);
        
        const { data: logData } = await _supabase.from('gym_logs').select('*').eq('user_name', user).order('date', {ascending: false});
        logs = logData || [];
        
        const { data: checkData } = await _supabase.from('gym_checks').select('date').eq('user_name', user);
        checks = {}; checkData?.forEach(c => checks[c.date] = true);
        
        renderAll();
    }

    async function migrateFromLocal() {
        const user = document.getElementById('userName').value;
        if (!user) return alert("請先輸入名字！");
        const oldLogs = JSON.parse(localStorage.getItem('gym_ultimate_logs')) || [];
        if (oldLogs.length === 0) return alert("手機裡沒舊資料。");
        
        const cloudLogs = oldLogs.map(l => ({
            user_name: user, date: l.date, group: l.group, item: l.item,
            is_crdo: !!l.isCrdo, weight: l.weight||0, sets: l.sets||0,
            slope: l.slope||0, speed: l.speed||0, reps: l.reps||0, time: l.time||0
        }));
        
        const { error } = await _supabase.from('gym_logs').insert(cloudLogs);
        if (!error) { alert("同步成功！"); initCloud(); }
    }

    async function saveRecord() {
        const user = document.getElementById('userName').value;
        if (!user) return alert("請輸入使用者！");
        const entry = {
            user_name: user, date: document.getElementById('inputDate').value,
            group: document.getElementById('inputGroup').value, item: document.getElementById('inputItem').value,
            is_crdo: document.getElementById('inputGroup').value === '有氧',
            weight: document.getElementById('inputW').value || 0, sets: document.getElementById('inputS').value || 0,
            slope: document.getElementById('inputSlope').value || 0, speed: document.getElementById('inputSpeed').value || 0,
            reps: document.getElementById('inputReps').value || 0, time: document.getElementById('inputTime').value || 0
        };
        await _supabase.from('gym_logs').insert([entry]);
        initCloud();
    }

    async function doCheckIn() {
        const user = document.getElementById('userName').value;
        const today = new Date().toISOString().split('T')[0];
        await _supabase.from('gym_checks').insert([{ user_name: user, date: today }]);
        initCloud();
    }

    function updateItems() {
        const g = document.getElementById('inputGroup').value;
        document.getElementById('inputItem').innerHTML = (exerciseDB[g] || []).map(i => `<option value="${i}">${i}</option>`).join('');
        handleItemChange();
    }

    function handleItemChange() {
        const g = document.getElementById('inputGroup').value;
        document.getElementById('strBox').style.display = g === '有氧' ? 'none' : 'flex';
        document.getElementById('crdoBox').style.display = g === '有氧' ? 'flex' : 'none';
    }

    function renderAll() {
        renderHistory(); renderCalendar();
    }

    function renderHistory() {
        const b = document.getElementById('historyBody');
        b.innerHTML = logs.slice(0, 15).map(l => `
            <tr>
                <td style="color:var(--accent); font-weight:bold;">${l.group}<br><small style="color:var(--text-dim)">${l.item}</small></td>
                <td>${l.is_crdo ? (l.slope+'% / '+l.speed) : (l.weight+'kg')}</td>
                <td>${l.is_crdo ? (l.time+'m / '+l.reps+'下') : (l.sets+'組')}</td>
                <td style="font-size:0.8rem;">${l.date.split('-').slice(1).join('/')}</td>
                <td><button class="btn-del" onclick="deleteLog('${l.id}')">✕</button></td>
            </tr>
        `).join('');
    }

    async function deleteLog(id) {
        if(!confirm("確定刪除？")) return;
        await _supabase.from('gym_logs').delete().eq('id', id);
        initCloud();
    }

    function renderCalendar() {
        const g = document.getElementById('calBox');
        g.innerHTML = ['日','一','二','三','四','五','六'].map(w => `<div style="font-size:0.7rem; color:#444;">${w}</div>`).join('');
        const d = new Date(), today = d.toISOString().split('T')[0];
        const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        for(let i=0; i<firstDay; i++) g.appendChild(document.createElement('div'));
        for(let i=1; i<=daysInMonth; i++) {
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const div = document.createElement('div');
            div.style.padding = "5px";
            div.style.borderRadius = "5px";
            div.style.background = checks[dateStr] ? "var(--accent)" : "#121416";
            div.style.color = checks[dateStr] ? "#fff" : (dateStr === today ? "var(--accent)" : "#444");
            div.innerText = i;
            g.appendChild(div);
        }
    }

    window.onload = () => {
        document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('inputGroup').innerHTML = Object.keys(exerciseDB).map(g => `<option value="${g}">${g}</option>`).join('');
        const savedUser = localStorage.getItem('gym_user_name');
        if(savedUser) { document.getElementById('userName').value = savedUser; initCloud(); }
        updateItems();
    };
</script>
</body>
</html>
